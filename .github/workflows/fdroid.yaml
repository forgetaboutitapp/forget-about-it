name: F-Droid Release

on:
  push:
    tags:
      - 'v*'

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.0

      - name: Build Android APK
        run: |
          cd frontend
          dart run build_runner build -d
          flutter build apk --release

      - name: Install fdroidserver
        run: |
          sudo apt-get update
          sudo apt-get install -y fdroidserver

      - name: Generate F-Droid Repo
        run: |
          mkdir -p fdroid/repo
          # Copy the built APK to the F-Droid repo directory
          cp frontend/build/app/outputs/flutter-apk/app-release.apk fdroid/repo/forget-about-it.apk
          cd fdroid
          fdroid init
          # Set the repo_url for GitHub Pages
          sed -i "s|.*repo_url:.*|repo_url: https://forgetaboutitapp.github.io/forget-about-it/repo|" config.yml
          fdroid update -c

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './fdroid'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
