# Generated basic setup using chatgpt
name: CI

on:
  push:
    branches:
      - main
      - '**'  # This will trigger on pushes to any branch
    tags:
      - 'v*'  # This will trigger on version tags

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: '1.25'  # Change to your desired Go version
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.0
      - name: Run Go tests
        run: |
          pwd
          cd ..
          git clone  --depth 1 https://github.com/forgetaboutitapp/protobufs
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest    
          sudo apt install just
          dart pub global activate protoc_plugin
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.28.0

          cd protobufs
          just
          cd ..
          cd forget-about-it
          chmod +x build.sh
          ./build.sh "${{ github.workspace }}"
          cd frontend
          flutter test

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.0
      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: '1.25'  # Change to your desired Go version
      - name: Build provisioning app
        run: |
          pwd
          cd ..
          git clone  --depth 1 https://github.com/forgetaboutitapp/protobufs
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest    
          sudo apt install just
          dart pub global activate protoc_plugin
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.28.0

          cd protobufs
          just
          cd ..
          cd forget-about-it
          chmod +x build.sh
          ./build.sh "${{ github.workspace }}"
      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          token: ${{ secrets.RELEASE_TOKEN }}
          files: |
            ${{ github.workspace }}/releases/*